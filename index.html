<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2E7D8C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>케어브릿지 — 암 요양병원 찾기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=608484a4f5536ddf83031123c853b135&libraries=services"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:#F0F4F8;color:#1A2B3C;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#F5F5F0;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.15)}

    /* ── HEADER ── */
    .hdr{background:#2E7D8C;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:58px}
    .hdr-back{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1;padding:0 4px 0 0}
    .hdr-title{font-size:18px;font-weight:700;line-height:1.2}
    .hdr-sub{font-size:12px;opacity:.8;margin-top:1px}
    .hdr-fav-btn{margin-left:auto;background:none;border:none;color:#fff;font-size:22px;cursor:pointer}

    /* ── VIEWS ── */
    .view{flex:1;overflow-y:auto;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}
    .view.active{display:flex}

    /* HOME */
    #vh{padding:20px 16px 24px;gap:12px;background:#F5F5F0}
    .logo-box{text-align:center;padding:8px 0 4px}
    .logo-circle{width:72px;height:72px;background:#2E7D8C;border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:10px}
    .home-h{font-size:21px;font-weight:700;line-height:1.4;text-align:center}
    .home-p{font-size:13px;color:#666;text-align:center;line-height:1.7;margin-top:6px}
    .sec-label{font-size:12px;font-weight:700;color:#2E7D8C;letter-spacing:.5px;margin-top:4px}
    .uni-btn{background:#fff;border:2px solid #E5E5E5;border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;width:100%}
    .uni-btn:active{background:#EAF5F7;border-color:#2E7D8C;transform:scale(.99)}
    .uni-icon{width:46px;height:46px;background:#EAF5F7;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .uni-info h3{font-size:15px;font-weight:700}
    .uni-info p{font-size:12px;color:#888;margin-top:2px}
    .uni-arrow{margin-left:auto;color:#2E7D8C;font-size:18px}

    /* FILTER BAR */
    .filter-wrap{background:#fff;border-bottom:1px solid #EDEDED;flex-shrink:0}
    .filter-bar{padding:10px 14px;display:flex;gap:7px;overflow-x:auto;white-space:nowrap}
    .filter-bar::-webkit-scrollbar{display:none}
    .fbtn{padding:7px 13px;border-radius:20px;border:1.5px solid #DDD;background:#fff;font-size:13px;font-weight:500;color:#666;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
    .fbtn.on{background:#2E7D8C;border-color:#2E7D8C;color:#fff}
    .sort-row{padding:6px 14px 8px;display:flex;gap:6px;align-items:center;border-top:1px solid #F5F5F5}
    .sort-lbl{font-size:11px;color:#AAA}
    .sbtn{padding:3px 10px;border-radius:12px;border:1px solid #DDD;background:#fff;font-size:12px;color:#777;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
    .sbtn.on{background:#2E7D8C;border-color:#2E7D8C;color:#fff}
    .result-lbl{padding:6px 16px 4px;font-size:12px;color:#AAA;flex-shrink:0}
    .result-lbl strong{color:#2E7D8C}

    /* HOSPITAL CARDS */
    .card-list{flex:1;overflow-y:auto;padding:10px 12px 16px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch}
    .card{background:#fff;border-radius:16px;padding:15px 15px 13px;border:1px solid #EEEEEE;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .card:active{transform:scale(.99);box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
    .card-name{font-size:15px;font-weight:700}
    .card-km{font-size:11px;color:#2E7D8C;font-weight:700;background:#EAF5F7;padding:3px 8px;border-radius:10px;flex-shrink:0;margin-left:8px}
    .card-addr{font-size:12px;color:#999;margin-bottom:9px}
    .badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
    .badge{padding:3px 7px;border-radius:8px;font-size:11px;font-weight:600}
    .b-ins{background:#E3F2FD;color:#1565C0}
    .b-prv{background:#F3E5F5;color:#6A1B9A}
    .b-chm{background:#E8F5E9;color:#2E7D32}
    .b-rad{background:#FFF3E0;color:#E65100}
    .card-bottom{display:flex;justify-content:space-between;align-items:center}
    .card-price{font-size:12px;color:#AAA}
    .card-price span{color:#E8654B;font-weight:700}
    .card-heart{background:none;border:none;font-size:20px;cursor:pointer;padding:2px}

    /* MAP */
    #view-map{position:relative}
    #kmap{width:100%;flex:1;min-height:200px}
    .map-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:16px;box-shadow:0 -4px 24px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .28s ease;z-index:10}
    .map-panel.show{transform:translateY(0)}
    .panel-handle{width:36px;height:4px;background:#DDD;border-radius:2px;margin:0 auto 12px}
    .panel-name{font-size:16px;font-weight:700;margin-bottom:3px}
    .panel-addr{font-size:13px;color:#888;margin-bottom:10px}
    .panel-btns{display:flex;gap:9px;margin-top:10px}
    .pbtn-detail{flex:1;padding:12px;background:#2E7D8C;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
    .pbtn-call{padding:12px 18px;background:#E8654B;color:#fff;border:none;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

    /* DETAIL */
    #view-detail{overflow-y:auto}
    .det-img{height:210px;background:linear-gradient(135deg,#2E7D8C,#1a5c6b);display:flex;align-items:center;justify-content:center;font-size:64px;flex-shrink:0}
    .det-body{padding:18px 18px 100px}
    .det-name{font-size:22px;font-weight:700;margin-bottom:4px}
    .det-addr{font-size:13px;color:#888;margin-bottom:14px;display:flex;align-items:center;gap:4px}
    .det-badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
    .det-sec{margin-bottom:18px}
    .det-sec-t{font-size:13px;font-weight:700;color:#2E7D8C;padding-bottom:8px;border-bottom:1px solid #EEE;margin-bottom:10px}
    .det-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F5F5F5;font-size:14px}
    .det-row-l{color:#888}
    .det-row-v{font-weight:600}
    .det-features{font-size:14px;color:#555;line-height:1.8}
    .disclaimer{background:#FFF8E1;border-radius:12px;padding:12px 14px;font-size:12px;color:#999;line-height:1.6}
    .fixed-btns{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px 16px 16px;background:#fff;border-top:1px solid #EEE;display:flex;gap:9px;z-index:99}
    .btn-call-big{flex:1;padding:15px;background:#E8654B;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-heart-big{padding:15px 18px;background:#F5F5F0;border:none;border-radius:14px;font-size:22px;cursor:pointer}

    /* FAVORITES */
    #view-fav{padding:12px;gap:9px;background:#F5F5F0}
    .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#CCC;text-align:center;padding:40px}
    .empty .ei{font-size:48px}
    .empty p{font-size:14px}

    /* BOTTOM NAV */
    .bnav{background:#fff;border-top:1px solid #EDEDED;display:flex;flex-shrink:0;safe-area-inset-bottom:env(safe-area-inset-bottom)}
    .nbtn{flex:1;padding:9px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:#BBB;transition:color .15s;font-family:'Noto Sans KR',sans-serif}
    .nbtn.on{color:#2E7D8C}
    .nbtn .ni{font-size:22px}
    .nbtn .nl{font-size:11px;font-weight:600}

    /* UTIL */
    .hidden{display:none!important}
    .no-result{text-align:center;padding:40px 20px;color:#AAA;font-size:14px}
  </style>
</head>
<body>
<div id="app">

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay" style="display:none;position:absolute;inset:0;background:rgba(46,125,140,.96);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#fff;text-align:center">
    <div style="font-size:48px">🏥</div>
    <div style="font-size:17px;font-weight:700" id="loading-title">병원 정보 불러오는 중...</div>
    <div style="font-size:13px;opacity:.75" id="loading-sub">구글 시트에서 최신 데이터를 가져옵니다</div>
  </div>

  <!-- HEADER -->
  <header class="hdr" id="hdr">
    <button class="hdr-back hidden" id="btn-back" onclick="goBack()">‹</button>
    <div>
      <div class="hdr-title" id="hdr-title">🏥 케어브릿지</div>
      <div class="hdr-sub" id="hdr-sub">암 요양병원 찾기</div>
    </div>
    <button class="hdr-fav-btn hidden" id="hdr-heart" onclick="toggleDetailFav()">🤍</button>
  </header>

  <!-- ── HOME ── -->
  <section class="view active" id="vh">
    <div class="logo-box">
      <div class="logo-circle">🏥</div>
      <div class="home-h">치료 받는 병원을<br>선택해 주세요</div>
      <div class="home-p">대학병원 주변 암 요양 전문 병원을<br>거리순으로 안내해 드립니다</div>
    </div>
    <div class="sec-label">서울 5대 암센터</div>
    <div id="uni-list"></div>
  </section>

  <!-- ── LIST ── -->
  <section class="view" id="vl">
    <div class="filter-wrap">
      <div class="filter-bar">
        <button class="fbtn" id="f-ins" onclick="toggleFilter('ins')">건강보험</button>
        <button class="fbtn" id="f-prv" onclick="toggleFilter('prv')">1인실</button>
        <button class="fbtn" id="f-chm" onclick="toggleFilter('chm')">항암 병행</button>
        <button class="fbtn" id="f-rad" onclick="toggleFilter('rad')">방사선 병행</button>
      </div>
      <div class="sort-row">
        <span class="sort-lbl">정렬</span>
        <button class="sbtn on" id="s-dist" onclick="setSort('dist')">거리순</button>
        <button class="sbtn" id="s-name" onclick="setSort('name')">이름순</button>
      </div>
    </div>
    <div class="result-lbl" id="result-lbl"></div>
    <div class="card-list" id="card-list"></div>
  </section>

  <!-- ── MAP ── -->
  <section class="view" id="view-map">
    <div id="kmap"></div>
    <div class="map-panel" id="map-panel">
      <div class="panel-handle"></div>
      <div class="panel-name" id="panel-name"></div>
      <div class="panel-addr" id="panel-addr"></div>
      <div class="badges" id="panel-badges"></div>
      <div class="panel-btns">
        <button class="pbtn-detail" onclick="openDetailFromPanel()">상세 보기</button>
        <button class="pbtn-call" onclick="callFromPanel()">📞 전화</button>
      </div>
    </div>
  </section>

  <!-- ── DETAIL ── -->
  <section class="view" id="vd">
    <div class="det-img" id="det-img">🏥</div>
    <div class="det-body">
      <div class="det-name" id="det-name"></div>
      <div class="det-addr" id="det-addr">📍 <span id="det-addr-txt"></span></div>
      <div class="det-badges" id="det-badges"></div>
      <div class="det-sec">
        <div class="det-sec-t">기본 정보</div>
        <div class="det-row"><span class="det-row-l">전화번호</span><span class="det-row-v" id="det-phone"></span></div>
        <div class="det-row"><span class="det-row-l">대학병원까지</span><span class="det-row-v" id="det-dist"></span></div>
        <div class="det-row"><span class="det-row-l">건강보험</span><span class="det-row-v" id="det-ins"></span></div>
        <div class="det-row"><span class="det-row-l">1인실</span><span class="det-row-v" id="det-prv"></span></div>
        <div class="det-row"><span class="det-row-l">항암 병행 입원</span><span class="det-row-v" id="det-chm"></span></div>
        <div class="det-row"><span class="det-row-l">방사선 병행 입원</span><span class="det-row-v" id="det-rad"></span></div>
      </div>
      <div class="det-sec">
        <div class="det-sec-t">비용 안내 (참고)</div>
        <div class="det-row"><span class="det-row-l">다인실 1일</span><span class="det-row-v" id="det-pw"></span></div>
        <div class="det-row"><span class="det-row-l">1인실 1일</span><span class="det-row-v" id="det-pp"></span></div>
      </div>
      <div class="det-sec">
        <div class="det-sec-t">주요 시설 및 특징</div>
        <div class="det-features" id="det-feat"></div>
      </div>
      <div class="disclaimer">⚠️ 입원 가능 여부, 비용, 보험 적용 여부는 반드시 병원에 직접 확인하시기 바랍니다. 제공 정보는 변경될 수 있습니다.</div>
    </div>
    <div class="fixed-btns">
      <button class="btn-call-big" id="det-call-btn">📞 전화 연결</button>
      <button class="btn-heart-big" id="det-heart-btn" onclick="toggleDetailFav()">🤍</button>
    </div>
  </section>

  <!-- ── FAVORITES ── -->
  <section class="view" id="view-fav">
    <div id="fav-list" style="display:flex;flex-direction:column;gap:9px;padding:10px 12px 16px"></div>
  </section>

  <!-- BOTTOM NAV -->
  <nav class="bnav" id="bnav">
    <button class="nbtn on" id="nb-list" onclick="switchTab('list')">
      <span class="ni">📋</span><span class="nl">리스트</span>
    </button>
    <button class="nbtn" id="nb-map" onclick="switchTab('map')">
      <span class="ni">🗺</span><span class="nl">지도</span>
    </button>
    <button class="nbtn" id="nb-fav" onclick="switchTab('fav')">
      <span class="ni">❤️</span><span class="nl">즐겨찾기</span>
    </button>
  </nav>

</div>

//  구글 시트 CSV 로더 + 자동 좌표 변환
// ═══════════════════════════════════════
function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else cur += c;
  }
  result.push(cur.trim());
  return result;
}

// 두 좌표 사이 거리 (km)
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 10) / 10;
}

// 주소 → 좌표 (카카오 지오코더, 캐시 적용)
function geocodeAddr(addr) {
  const cache = JSON.parse(localStorage.getItem('cb_geo') || '{}');
  if (cache[addr]) return Promise.resolve(cache[addr]);
  return new Promise((resolve) => {
    try {
      const gc = new kakao.maps.services.Geocoder();
      gc.addressSearch(addr, (result, status) => {
        if (status === kakao.maps.services.Status.OK) {
          const coords = { lat: +result[0].y, lng: +result[0].x };
          cache[addr] = coords;
          localStorage.setItem('cb_geo', JSON.stringify(cache));
          resolve(coords);
        } else {
          resolve(null);
        }
      });
    } catch(e) { resolve(null); }
  });
}

function setLoading(title, sub) {
  const t = document.getElementById('loading-title');
  const s = document.getElementById('loading-sub');
  if (t) t.textContent = title;
  if (s) s.textContent = sub || '';
}

async function loadSheetData() {
  if (!SHEET_CSV_URL) return;
  const overlay = document.getElementById('loading-overlay');
  overlay.style.display = 'flex';
  try {
    // 1단계: 시트에서 CSV 다운로드
    setLoading('병원 정보 불러오는 중...', '구글 시트에서 데이터를 가져옵니다');
    const res  = await fetch(SHEET_CSV_URL);
    const text = await res.text();
    const rows = text.trim().split(/\r?\n/).slice(1);

    HOSPITALS.length = 0;
    rows.forEach((line, i) => {
      const c = parseCSVLine(line);
      // 컬럼: uni, name, addr, phone, ins, prv, chm, rad, pw, pp, feat, emoji
      if (c.length < 8 || !c[1]) return;
      HOSPITALS.push({
        id:    i + 1,
        uni:   c[0], name:  c[1], addr: c[2], phone: c[3],
        lat:   0,    lng:   0,    km:   0,
        ins:   (c[4] || '').toUpperCase() === 'Y',
        prv:   (c[5] || '').toUpperCase() === 'Y',
        chm:   (c[6] || '').toUpperCase() === 'Y',
        rad:   (c[7] || '').toUpperCase() === 'Y',
        pw:    +c[8]  || 0,
        pp:    +c[9]  || 0,
        feat:  c[10]  || '',
        emoji: c[11]  || '🏥',
      });
    });

    // 2단계: 주소 → 좌표 자동 변환
    let done = 0;
    for (const h of HOSPITALS) {
      done++;
      setLoading(
        `📍 주소 → 좌표 변환 중 (${done}/${HOSPITALS.length})`,
        h.name + ' 위치 확인 중...'
      );
      const coords = await geocodeAddr(h.addr);
      if (coords) {
        h.lat = coords.lat;
        h.lng = coords.lng;
        const uni = UNIS.find(u => u.id === h.uni);
        if (uni) h.km = haversineKm(uni.lat, uni.lng, h.lat, h.lng);
      }
      await new Promise(r => setTimeout(r, 80)); // API 속도 제한 방지
    }
    console.log('✅ 시트에서 병원 ' + HOSPITALS.length + '개 로드 + 좌표 변환 완료');
  } catch(e) {
    console.warn('시트 연동 실패, 기본 샘플 데이터 사용:', e);
  } finally {
    overlay.style.display = 'none';
  }
}

let currentView = 'home'; // home | list | map | detail | fav
let _skipHistory = false;

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  const map = { home:'vh', list:'vl', map:'view-map', detail:'vd', fav:'view-fav' };
  document.getElementById(map[v]).classList.add('active');

  const bnav = document.getElementById('bnav');
  const backBtn = document.getElementById('btn-back');
  const heartBtn = document.getElementById('hdr-heart');

  // header
  const titles = {
    home: ['🏥 케어브릿지', '암 요양병원 찾기'],
    list: [state.uni ? getUni(state.uni).name + ' 주변' : '요양병원 목록', '가까운 암 요양병원'],
    map:  [state.uni ? getUni(state.uni).name + ' 주변' : '지도', '지도로 보기'],
    detail: [state.currentHospital ? state.currentHospital.name : '', '병원 상세'],
    fav:  ['즐겨찾기', '저장한 병원'],
  };
  document.getElementById('hdr-title').textContent = titles[v][0];
  document.getElementById('hdr-sub').textContent   = titles[v][1];

  backBtn.classList.toggle('hidden', v === 'home' || v === 'fav');
  heartBtn.classList.toggle('hidden', v !== 'detail');
  bnav.classList.toggle('hidden', v === 'home' || v === 'detail');

  // bottom nav active state
  ['list','map','fav'].forEach(t => {
    document.getElementById('nb-' + t).classList.toggle('on', v === t);
  });

  if (v === 'map') initMapIfNeeded();
  if (v === 'fav') renderFavs();

  if (!_skipHistory) history.pushState({ view: v }, '');
  _skipHistory = false;
  currentView = v;
}

function switchTab(tab) {
  if (!state.uni && tab !== 'fav') return;
  showView(tab);
  if (tab === 'list') renderList();
  if (tab === 'map')  renderMarkers();
}

function goBack() {
  history.back();
}

function getUni(id) { return UNIS.find(u => u.id === id); }

// ═══════════════════════════════════════
//  LIST
// ═══════════════════════════════════════
function getFiltered() {
  let list = HOSPITALS.filter(h => h.uni === state.uni);
  const f = state.filters;
  if (f.ins) list = list.filter(h => h.ins);
  if (f.prv) list = list.filter(h => h.prv);
  if (f.chm) list = list.filter(h => h.chm);
  if (f.rad) list = list.filter(h => h.rad);
  if (state.sort === 'dist') list.sort((a,b) => a.km - b.km);
  if (state.sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  return list;
}

function toggleFilter(key) {
  state.filters[key] = !state.filters[key];
  document.getElementById('f-'+key).classList.toggle('on', state.filters[key]);
  renderList();
  if (currentView === 'map') renderMarkers();
}

function setSort(s) {
  state.sort = s;
  ['dist','name'].forEach(k => document.getElementById('s-'+k).classList.toggle('on', state.sort === k));
  renderList();
}

function renderList() {
  const list = getFiltered();
  const lbl = document.getElementById('result-lbl');
  lbl.innerHTML = `총 <strong>${list.length}개</strong> 병원`;
  const el = document.getElementById('card-list');
  if (!list.length) {
    el.innerHTML = '<div class="no-result">조건에 맞는 병원이 없습니다.<br>필터를 변경해 주세요.</div>';
    return;
  }
  el.innerHTML = list.map(h => cardHTML(h)).join('');
}

function cardHTML(h) {
  const fav = isFav(h.id) ? '❤️' : '🤍';
  const badges = badgesHTML(h);
  const priceStr = h.pw ? `다인실 <span>${h.pw.toLocaleString()}원</span>/일` : '';
  return `
    <div class="card" onclick="openDetail(${h.id}, 'list')">
      <div class="card-top">
        <div class="card-name">${h.emoji} ${h.name}</div>
        <div class="card-km">${h.km}km</div>
      </div>
      <div class="card-addr">📍 ${h.addr}</div>
      <div class="badges">${badges}</div>
      <div class="card-bottom">
        <div class="card-price">${priceStr}</div>
        <button class="card-heart" onclick="event.stopPropagation();quickFav(${h.id})">${fav}</button>
      </div>
    </div>`;
}

function badgesHTML(h) {
  let b = '';
  if (h.ins) b += '<span class="badge b-ins">건강보험</span>';
  if (h.prv) b += '<span class="badge b-prv">1인실</span>';
  if (h.chm) b += '<span class="badge b-chm">항암병행</span>';
  if (h.rad) b += '<span class="badge b-rad">방사선병행</span>';
  return b;
}

function quickFav(id) {
  if (isFav(id)) state.favs = state.favs.filter(x => x !== id);
  else state.favs.push(id);
  saveFavs();
  renderList();
}

//  MAP
// ═══════════════════════════════════════
function initMapIfNeeded() {
  if (state.mapInited) return;
  const uni = getUni(state.uni);
  if (!uni) return;

  setTimeout(() => {
    try {
      const container = document.getElementById('kmap');
      const options = { center: new kakao.maps.LatLng(uni.lat, uni.lng), level: 5 };
      state.kakaoMap = new kakao.maps.Map(container, options);

      // 대학병원 마커
      new kakao.maps.Marker({
        map: state.kakaoMap,
        position: new kakao.maps.LatLng(uni.lat, uni.lng),
        title: uni.name,
        image: new kakao.maps.MarkerImage(
          'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
          new kakao.maps.Size(24, 35)
        )
      });

      state.mapInited = true;
      renderMarkers();
    } catch(e) { console.warn('Kakao Map 초기화 실패:', e); }
  }, 80);
}

function renderMarkers() {
  if (!state.kakaoMap) return;
  state.kakaoMarkers.forEach(m => m.setMap(null));
  state.kakaoMarkers = [];

  getFiltered().forEach(h => {
    const pos = new kakao.maps.LatLng(h.lat, h.lng);
    const marker = new kakao.maps.Marker({ map: state.kakaoMap, position: pos, title: h.name });
    kakao.maps.event.addListener(marker, 'click', () => openMapPanel(h));
    state.kakaoMarkers.push(marker);
  });
}

function openMapPanel(h) {
  state.panelHospital = h;
  document.getElementById('panel-name').textContent  = h.emoji + ' ' + h.name;
  document.getElementById('panel-addr').textContent  = h.addr;
  document.getElementById('panel-badges').innerHTML  = badgesHTML(h);
  document.getElementById('map-panel').classList.add('show');
}

document.getElementById('map-panel').addEventListener('click', function(e) {
  if (e.target === this || e.target.classList.contains('panel-handle'))
    this.classList.remove('show');
});

function openDetailFromPanel() {
  if (state.panelHospital) openDetail(state.panelHospital.id, 'map');
}

function callFromPanel() {
  if (state.panelHospital) window.location.href = 'tel:' + state.panelHospital.phone;

  if (hHdr) hHdr.textContent = v;

function toggleDetailFav() {

  if (!id) return;
  if (isFav(id)) state.favs = state.favs.filter(x => x !== id);
  else state.favs.push(id);
  saveFavs();
  updateDetailHeart();

  const list = HOSPITALS.filter(h => isFav(h.id));
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="ei">🤍</div><p>저장한 병원이 없습니다.<br>병원 카드의 하트를 눌러 저장해 보세요</p></div>';
    return;
  }
  el.innerHTML = list.map(h => `
    <div class="card" onclick="openDetail(${h.id}, 'fav')">
      <div class="card-top">
        <div class="card-name">${h.emoji} ${h.name}</div>
        <div class="card-km">${h.km}km</div>
      </div>
      <div class="card-addr">📍 ${h.addr}</div>
      <div class="badges">${badgesHTML(h)}</div>
      <div class="card-bottom">
        <div class="card-price">${h.pw ? '다인실 <span>' + h.pw.toLocaleString() + '원</span>/일' : ''}</div>
        <button class="card-heart" onclick="event.stopPropagation();removeFav(${h.id})">❤️</button>
      </div>
    </div>
  `).join('');
}

function removeFav(id) {
  state.favs = state.favs.filter(x => x !== id);
  saveFavs();
  renderFavs();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
(async () => {
  await loadSheetData();
  renderHome();
  history.replaceState({ view: 'home' }, '');
  window.addEventListener('popstate', function(e) {
    const v = (e.state && e.state.view) || 'home';
    _skipHistory = true;
    showView(v);
    if (v === 'list') renderList();
    if (v === 'map')  renderMarkers();
  });
})();
</script>
